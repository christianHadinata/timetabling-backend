# ===========================
# APPLICATION
# ===========================
spring.application.name=timetablingapp
server.port=8080

# TimetableService injects itself (@Lazy) to route self-calls through the AOP proxy so
# @Async/@Transactional keep working (see its class javadoc). Boot's CGLIB proxy for that
# @Lazy self-reference is created fine under the flat classpath used by `./gradlew bootRun`,
# but fails under the packaged jar's LaunchedURLClassLoader, which makes Boot's circular-
# reference guard hard-fail instead of falling back to its lazy proxy. This is Spring's
# documented escape hatch for that exact case.
spring.main.allow-circular-references=true

# ===========================
# DATASOURCE (existing Laravel DB)
# ===========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/timetab?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Receiver1}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===========================
# JWT CONFIGURATION
# ===========================
jwt.secret=${JWT_SECRET:kk01yAiWo4uX2QEd4f8DIUfSBSpN8Jfy34Bld2gVmWI}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===========================
# GENETIC ALGORITHM DEFAULTS
# ===========================
ga.population-size=100
ga.generations=500
ga.crossover-rate=0.8
ga.mutation-rate=0.1

# ===========================
# SWAGGER / OPENAPI
# ===========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===========================
# FILE UPLOAD LIMITS
# ===========================
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ===========================
# CORS (frontend origin) — read by CorsConfig
# ===========================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}

# ===========================
# EXCEL IMPORT
# ===========================
# Fallback jurusan id for imported lecturers when the importer's faculty can't be resolved.
# Legacy rule for lecturers.home_base is undocumented — change this (or
# LecturerService.resolveHomeBase) when the real rule is known. See phase9.md D2.
app.import.default-home-base=1
